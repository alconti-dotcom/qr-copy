<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Grid</title>
    <!-- Foolproof QR generator library -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; margin: 0; }
        h1 { text-align: center; color: #333; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: space-between; min-height: 280px; }
        .qr-box { margin: 15px 0; background: #fff; padding: 10px; border: 1px solid #ddd; border-radius: 8px; display: inline-block; }
        .text-preview { font-weight: bold; color: #555; margin-bottom: 15px; word-break: break-word; }
        button { background: #28a745; color: white; border: none; padding: 10px 20px; font-size: 14px; border-radius: 6px; cursor: pointer; width: 100%; transition: background 0.2s; }
        button:hover { background: #218838; }
    </style>
</head>
<body>

<h1>Scan QR to Visit or Click to Copy</h1>
<div class="grid" id="cardGrid"></div>

<script>
// EDIT YOUR 9 TEXT PHRASES HERE:
const textItems = [
    "Text Item Number One",
    "Text Item Number Two",
    "Text Item Number Three",
    "Text Item Number Four",
    "Text Item Number Five",
    "Text Item Number Six",
    "Text Item Number Seven",
    "Text Item Number Eight",
    "Text Item Number Nine"
];

const grid = document.getElementById("cardGrid");
// Automatically forces lowercase to match GitHub Pages link structure
const cleanBaseUrl = window.location.origin + window.location.pathname;

textItems.forEach((text, index) => {
    const itemId = index + 1;
    const itemTargetUrl = `${cleanBaseUrl}?item=${itemId}`;

    // Create the visual card layout
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
        <div class="text-preview">Text #${itemId}: "${text}"</div>
        <div class="qr-box" id="qr-${itemId}"></div>
        <button onclick="copyToClipboard('${text.replace(/'/g, "\\'")}')">Copy Text #${itemId}</button>
    `;
    grid.appendChild(card);

    // Generate the QR code as a clean HTML image tag
    try {
        var qr = qrcode(0, 'M');
        qr.addData(itemTargetUrl);
        qr.make();
        document.getElementById(`qr-${itemId}`).innerHTML = qr.createImgTag(4);
    } catch(e) {
        console.error("QR Code Error:", e);
    }
});

// Handle the manual button click copy
function copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(() => {
        alert(`Copied to clipboard: "${text}"`);
    }).catch(err => {
        console.error("Copy failed", err);
    });
}

// Auto-trigger copy when a QR code is scanned
window.onload = function() {
    const urlParams = new URLSearchParams(window.location.search);
    const scannedItem = urlParams.get('item');
    
    if (scannedItem) {
        const itemIndex = parseInt(scannedItem) - 1;
        if (textItems[itemIndex]) {
            const targetText = textItems[itemIndex];
            alert(`You scanned QR #${scannedItem}! Tap OK to copy the text.`);
            copyToClipboard(targetText);
        }
    }
};
</script>

</body>
</html>
